name: Sync from upstream

# Keeps liberathio/hermes-agent aligned with NousResearch/hermes-agent.
# Opens a PR rather than pushing directly, so CI runs before the sync lands on main.

on:
  schedule:
    # Mondays at 06:17 UTC — off-peak, deterministic minute to dodge cron stampedes.
    - cron: '17 6 * * 1'
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: 'Upstream ref to sync from (default: main)'
        required: false
        default: 'main'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    name: Sync fork with NousResearch/hermes-agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        env:
          UPSTREAM_REF: ${{ github.event.inputs.upstream_ref || 'main' }}
        run: |
          set -euo pipefail
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch upstream "${UPSTREAM_REF}":refs/remotes/upstream/"${UPSTREAM_REF}"

      - name: Compute drift
        id: drift
        env:
          UPSTREAM_REF: ${{ github.event.inputs.upstream_ref || 'main' }}
        run: |
          set -euo pipefail
          BEHIND=$(git rev-list --count "origin/main..upstream/${UPSTREAM_REF}")
          AHEAD=$(git rev-list --count "upstream/${UPSTREAM_REF}..origin/main")
          UPSTREAM_SHA=$(git rev-parse "upstream/${UPSTREAM_REF}")
          echo "behind=${BEHIND}"        >> "$GITHUB_OUTPUT"
          echo "ahead=${AHEAD}"          >> "$GITHUB_OUTPUT"
          echo "upstream_sha=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"
          echo "Behind upstream by ${BEHIND} commits, ahead by ${AHEAD}."

      - name: Up to date — exit
        if: steps.drift.outputs.behind == '0'
        run: echo "Fork is already aligned with upstream. Nothing to do."

      - name: Push sync branch
        if: steps.drift.outputs.behind != '0'
        id: push
        env:
          UPSTREAM_SHA: ${{ steps.drift.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          BRANCH="upstream-sync/$(date -u +%Y%m%d-%H%M)-${UPSTREAM_SHA:0:7}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

          # Reuse existing branch if a previous run already pushed the same upstream SHA.
          if git ls-remote --exit-code --heads origin "${BRANCH}" >/dev/null 2>&1; then
            echo "Sync branch ${BRANCH} already exists on origin — reusing."
            exit 0
          fi

          git checkout -B "${BRANCH}" "${UPSTREAM_SHA}"
          git push origin "${BRANCH}"

      - name: Open / update sync PR
        if: steps.drift.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.push.outputs.branch }}
          BEHIND: ${{ steps.drift.outputs.behind }}
          AHEAD: ${{ steps.drift.outputs.ahead }}
          UPSTREAM_SHA: ${{ steps.drift.outputs.upstream_sha }}
          UPSTREAM_REF: ${{ github.event.inputs.upstream_ref || 'main' }}
        run: |
          set -euo pipefail

          if gh pr view "${BRANCH}" --json number >/dev/null 2>&1; then
            echo "PR for ${BRANCH} already exists — leaving as is."
            exit 0
          fi

          BODY=$(cat <<EOF
          Automated sync from \`NousResearch/hermes-agent@${UPSTREAM_REF}\`.

          - Upstream HEAD: \`${UPSTREAM_SHA}\`
          - Fork was **${BEHIND}** commits behind, **${AHEAD}** commits ahead.

          Review the diff and let CI pass before merging. If the fork has zero local commits ahead, this is effectively a fast-forward and can be merged once green.

          _Generated by \`.github/workflows/sync-upstream.yml\`._
          EOF
          )

          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore(sync): pull upstream NousResearch/hermes-agent@${UPSTREAM_REF}" \
            --body "${BODY}" \
            --label "upstream-sync" || \
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore(sync): pull upstream NousResearch/hermes-agent@${UPSTREAM_REF}" \
            --body "${BODY}"
