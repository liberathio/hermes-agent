name: Sync from upstream

# Keeps liberathio/hermes-agent aligned with NousResearch/hermes-agent.
# Opens a PR rather than pushing directly, so CI runs before the sync lands on main.
#
# REQUIRED SECRET: SYNC_TOKEN
#   GITHUB_TOKEN does not have the `workflow` OAuth scope, so it cannot create
#   or update branches that touch `.github/workflows/*`. Almost every upstream
#   sync will touch workflow files, so we need a fine-grained PAT with:
#     - Contents: read & write
#     - Pull requests: read & write
#     - Workflows: read & write
#
#   Source of truth is 1Password (vault `Personal`, item
#   `GitHub PAT — hermes-agent SYNC_TOKEN`). To rotate the secret, run:
#     ./scripts/ops/rotate-sync-token.sh
#   That script reads the PAT from 1Password and writes it to the GitHub
#   Actions secret `SYNC_TOKEN`. Never paste the PAT in plaintext on disk
#   or in CI logs. The workflow falls back to GITHUB_TOKEN and posts an
#   actionable issue if SYNC_TOKEN is missing.

on:
  schedule:
    # Every 3 days at 06:17 UTC — fires on day-of-month 1,4,7,...,28,31
    # (1-3 day gap at month rollover is acceptable for upstream drift).
    # Off-peak, deterministic minute to dodge cron stampedes.
    - cron: '17 6 */3 * *'
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: 'Upstream ref to sync from (default: main)'
        required: false
        default: 'main'

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    name: Sync fork with NousResearch/hermes-agent
    runs-on: ubuntu-latest
    steps:
      - name: Resolve token
        id: token
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          if [ -n "${SYNC_TOKEN}" ]; then
            echo "has_pat=true"  >> "$GITHUB_OUTPUT"
            echo "Using SYNC_TOKEN PAT for git operations."
          else
            echo "has_pat=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SYNC_TOKEN secret is missing. Falling back to GITHUB_TOKEN; pushes that touch .github/workflows/* will fail."
          fi

      - name: Checkout fork
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.SYNC_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        env:
          UPSTREAM_REF: ${{ github.event.inputs.upstream_ref || 'main' }}
        run: |
          set -euo pipefail
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch upstream "${UPSTREAM_REF}":refs/remotes/upstream/"${UPSTREAM_REF}"

      - name: Compute drift
        id: drift
        env:
          UPSTREAM_REF: ${{ github.event.inputs.upstream_ref || 'main' }}
        run: |
          set -euo pipefail
          BEHIND=$(git rev-list --count "origin/main..upstream/${UPSTREAM_REF}")
          AHEAD=$(git rev-list --count "upstream/${UPSTREAM_REF}..origin/main")
          UPSTREAM_SHA=$(git rev-parse "upstream/${UPSTREAM_REF}")
          echo "behind=${BEHIND}"             >> "$GITHUB_OUTPUT"
          echo "ahead=${AHEAD}"               >> "$GITHUB_OUTPUT"
          echo "upstream_sha=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"
          echo "Behind upstream by ${BEHIND} commits, ahead by ${AHEAD}."

      - name: Up to date — exit
        if: steps.drift.outputs.behind == '0'
        run: echo "Fork is already aligned with upstream. Nothing to do."

      - name: Push sync branch
        if: steps.drift.outputs.behind != '0'
        id: push
        env:
          UPSTREAM_SHA: ${{ steps.drift.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          BRANCH="upstream-sync/$(date -u +%Y%m%d-%H%M)-${UPSTREAM_SHA:0:7}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

          if git ls-remote --exit-code --heads origin "${BRANCH}" >/dev/null 2>&1; then
            echo "Sync branch ${BRANCH} already exists on origin — reusing."
            echo "pushed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git checkout -B "${BRANCH}" "${UPSTREAM_SHA}"

          if git push origin "${BRANCH}"; then
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "::error::Failed to push sync branch. If the error mentions 'workflows permission', add a SYNC_TOKEN PAT (see workflow header)."
            exit 1
          fi

      - name: Open / update sync PR
        if: steps.drift.outputs.behind != '0' && steps.push.outputs.pushed == 'true'
        env:
          # Use GITHUB_TOKEN for PR creation: the branch push above already
          # used SYNC_TOKEN (only that PAT can write workflow files), but
          # `gh pr create` only needs `pull_requests: write`, which the
          # default GITHUB_TOKEN already has via the workflow `permissions:`
          # block at the top. Some fine-grained PATs return "Resource not
          # accessible by personal access token (createPullRequest)" even
          # with pull-requests:write enabled — using GITHUB_TOKEN sidesteps
          # that whole class of failure.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.push.outputs.branch }}
          BEHIND: ${{ steps.drift.outputs.behind }}
          AHEAD: ${{ steps.drift.outputs.ahead }}
          UPSTREAM_SHA: ${{ steps.drift.outputs.upstream_sha }}
          UPSTREAM_REF: ${{ github.event.inputs.upstream_ref || 'main' }}
        run: |
          set -euo pipefail

          if gh pr view --repo "${GITHUB_REPOSITORY}" "${BRANCH}" --json number >/dev/null 2>&1; then
            echo "PR for ${BRANCH} already exists — leaving as is."
            exit 0
          fi

          BODY=$(cat <<EOF
          Automated sync from \`NousResearch/hermes-agent@${UPSTREAM_REF}\`.

          - Upstream HEAD: \`${UPSTREAM_SHA}\`
          - Fork was **${BEHIND}** commits behind, **${AHEAD}** commits ahead.

          Review the diff and let CI pass before merging. If the fork has zero local commits ahead, this is effectively a fast-forward and can be merged once green.

          _Generated by \`.github/workflows/sync-upstream.yml\`._
          EOF
          )

          # --repo is critical: `gh pr create` on a fork defaults to opening
          # the PR against the parent (NousResearch/hermes-agent), not within
          # this fork. That's the actual cause of every "Resource not
          # accessible by ..." error in this workflow's history — neither
          # SYNC_TOKEN nor GITHUB_TOKEN has rights to file PRs against the
          # upstream. Pinning the target repo forces the within-fork flow.
          #
          # --label "upstream-sync" intentionally omitted: the label doesn't
          # exist in this fork and creating it on the fly adds noise.
          gh pr create \
            --repo "${GITHUB_REPOSITORY}" \
            --base main \
            --head "${BRANCH}" \
            --title "chore(sync): pull upstream NousResearch/hermes-agent@${UPSTREAM_REF}" \
            --body "${BODY}"

      - name: Open tracking issue when SYNC_TOKEN is missing
        if: failure() && steps.token.outputs.has_pat == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEHIND: ${{ steps.drift.outputs.behind }}
          UPSTREAM_SHA: ${{ steps.drift.outputs.upstream_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          TITLE="Upstream sync blocked: SYNC_TOKEN secret missing"

          if gh issue list --search "${TITLE} in:title" --state open --json number --jq 'length' | grep -qv '^0$'; then
            echo "Tracking issue already open."
            exit 0
          fi

          gh issue create \
            --title "${TITLE}" \
            --label "upstream-sync,needs-config" \
            --body "$(cat <<EOF
          The \`Sync from upstream\` workflow cannot push because no \`SYNC_TOKEN\` secret is configured.

          - Behind upstream by **${BEHIND:-?}** commits (target HEAD: \`${UPSTREAM_SHA:-unknown}\`).
          - Failed run: ${RUN_URL}

          ### How to fix

          Create a fine-grained Personal Access Token with the following permissions on \`liberathio/hermes-agent\`:
          - **Contents:** read & write
          - **Pull requests:** read & write
          - **Workflows:** read & write

          Add it as the repository secret \`SYNC_TOKEN\` (Settings → Secrets and variables → Actions). Then re-run the failed workflow.

          ### Why GITHUB_TOKEN is not enough

          \`GITHUB_TOKEN\` lacks the \`workflow\` OAuth scope, so it cannot create or update branches that touch \`.github/workflows/*\`. Almost every upstream sync touches at least one workflow file, so the push is rejected.
          EOF
          )"
